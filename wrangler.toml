# Cloudflare config. Enables one-command static deploys:
#   npm run build && npx wrangler pages deploy out
# (Also works with the dashboard Git integration — Cloudflare reads
# pages_build_output_dir from here.)
name = "ai-investing-compass"
pages_build_output_dir = "out"
compatibility_date = "2026-06-30"

# Newsletter subscriber store (functions/api/subscribe.ts).
# Namespace created in the account as "aistock-subscribers".
[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "8aba65b34a574604bb34d3b623ca8c68"
