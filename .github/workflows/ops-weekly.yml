name: Weekly content ops

on:
  schedule:
    # Mondays 09:23 UTC (~17:23 北京时间)
    - cron: '23 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  open-ops-issue:
    name: Open weekly ops issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              '@claude 请执行本周内容运营(完整规范见 docs/operations.md)。写作前先加载项目 skills(.claude/skills/):用 content-engine 与 crosspost 做平台适配,用 article-writing 保证长文质量,用 brand-voice 保持声音一致,涉及 SEO 判断时用 seo:',
              '',
              '1. 阅读 `docs/operations.md` 与 `content/templates/`;阅读 `lib/data/updates.ts` 了解已有条目。',
              '2. 搜集过去 7 天 AI 板块与 8 位传奇投资人(巴菲特/Cathie Wood/Druckenmiller/Ackman/段永平/David Tepper/Philippe Laffont/Michael Burry)的持仓与行情要闻,筛出 1–3 条重要且可溯源的。',
              '3. 若无值得记录的要闻:在本 Issue 评论说明并关闭,不做改动。',
              '4. 否则:按现有格式把要闻加入 `lib/data/updates.ts`(双语、date、themeIds、tickers、sources 齐全真实);若涉及持仓重大变化,同步更新 `lib/data/investors.ts`(holdings/thesis/asOf/sources)。',
              '5. 按 `content/templates/` 用新数据写 1–2 篇平台帖草稿,存入 `content/drafts/' + today.slice(0, 7) + '/`。数字必须可溯源、带截至日期与免责声明。',
              '5b. 若数据更新导致「罗盘共识分」(lib/data/score.ts,由 holdings 的 action 字段驱动)发生变动,优先用共识分变动做钩子(例:「NVDA 共识分从 42 跌到 34:又一位大佬减持」),并在帖尾引导到 /zh/consensus 共识榜。这是本站独有指标,是推广的差异化武器。',
              '5c. 有机营销引擎(重点):往 `lib/content/insights.ts` 的 `insights` 数组**追加 1 篇**新洞察文章(双语 title/description/keywords/body,body 为若干 {h,p} 小节)。选一个真实高意图搜索词(如「某大佬 AI 持仓」「AI 龙头 共识」「某只票 值得买吗」),用 seo + article-writing + brand-voice 技能保证质量与声音一致;数字须可溯源、含免责声明。这会自动生成 /insights/[slug] 页(含 Article 结构化数据)、进 sitemap 与 RSS——无需任何社媒账号即可持续攒有机流量。',
              '6. `npm ci && npm run lint && npm run build` 通过后,在新分支提交并开 PR 到 main,标题「周运营更新 ' + today + '」,正文列出要闻来源、改动文件、草稿清单。不要自行合并。',
              '',
              '红线:数字必须有出处;宁可不更新,不可编造;只动数据与内容文件,不改站点代码结构。',
              '',
              '---',
              '_此 Issue 由 ops-weekly.yml 每周一自动创建。若未安装 Claude GitHub App,可把上述内容粘贴到任意 Claude Code 会话执行。发布环节(雪球/公众号/小红书/X)始终人工完成。_',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📝 周内容运营 ${today}`,
              body,
            });
