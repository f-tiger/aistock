name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  cloudflare-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy token
        id: token
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN secret 未设置——跳过部署。到 dash.cloudflare.com/profile/api-tokens 创建含「Cloudflare Pages: Edit」权限的 token,存为仓库 Secret 即启用自动部署。"
          fi

      - uses: actions/checkout@v4
        if: steps.token.outputs.present == 'true'

      - uses: actions/setup-node@v4
        if: steps.token.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install
        if: steps.token.outputs.present == 'true'
        run: npm ci

      - name: Build (static export)
        if: steps.token.outputs.present == 'true'
        env:
          NEXT_PUBLIC_SITE_URL: https://ai-investing-compass.pages.dev
        run: npm run build

      - name: Ensure Pages project exists
        if: steps.token.outputs.present == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Idempotent: fails harmlessly if the project already exists.
        run: npx -y wrangler@latest pages project create ai-investing-compass --production-branch main || true

      - name: Deploy to Cloudflare Pages (production)
        if: steps.token.outputs.present == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # wrangler reads wrangler.toml: output dir, SUBSCRIBERS KV binding, and
        # bundles functions/ as Pages Functions automatically.
        run: npx -y wrangler@latest pages deploy out --project-name ai-investing-compass --branch main --commit-hash "${{ github.sha }}"
