name: Weekly health check

on:
  schedule:
    # Mondays 22:13 UTC (~周二 06:13 北京时间)
    - cron: '13 22 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    name: Build & site health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build

      - name: Ping deployed site (set repo variable SITE_URL to enable)
        if: vars.SITE_URL != ''
        run: |
          curl -sSf --max-time 20 "${{ vars.SITE_URL }}/zh/" -o /dev/null
          curl -sSf --max-time 20 "${{ vars.SITE_URL }}/en/consensus/" -o /dev/null

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 周健康检查失败 ${today}`,
              body: [
                '自动健康检查(构建/lint/站点可达性)失败。',
                '',
                `失败运行: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '排查建议:打开运行日志,定位失败步骤;若是站点 Ping 失败,检查 Cloudflare Pages 部署状态。',
              ].join('\n'),
            });
